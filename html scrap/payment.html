<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <style>
      body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1100, rgb(47, 129, 48)); /* Gradient background */
            display: flex;
            flex-direction: column; /* Stack content vertically */
            align-items: center;
            min-height: 100vh;
        }

        /* Header Styles */
        .header-container {
           display: flex;
           align-items: center;
           justify-content: space-between;
           width: 100%;
           padding: 10px 20px;
           box-sizing: border-box; /*Include padding and border*/
            margin-bottom: 10px;
        }
        
         .logo-container {
            display: flex;
            align-items: center;
        }
        
        .logo {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        
        .home-button-container {
            text-align: center;
            flex-grow: 1;
            display: flex;
           justify-content: center;
        }

        .home-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        /* Payment form container */
       .payment-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 440px; /* Widened the box 1.1 times from 400*/
            margin-top: 20px; /* shift down*/
        }
          .payment-form-wrapper {
            width: 100%;
            box-sizing: border-box; /* Include padding and border*/
        }

        /* Individual form fields */
        .form-group {
            margin-bottom: 15px;
        }

         label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
             font-size: 14px;
              color: #000;
        }

        /* Proceed button */
         button {
            width: 100%;
            padding: 10px;
            background-color: rgb(47, 129, 48);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
             transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #3a9b3d;
        }
        /* Messages for the user */
        .success-message {
            color: green;
            margin-top: 10px;
            text-align: center;
        }
         .error-message {
            color: red;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
       <div class="header-container">
           <div class="logo-container">
               <img class="logo" src="path_to_image/logo.png" alt="Logo">
           </div>
          <div class="home-button-container">
               <a href="index.html" class="home-button">Home</a>
           </div>
       </div>
    <div class="payment-container">
        <div class="payment-form-wrapper">
             <h2 style="text-align: center; margin-bottom: 20px;">Payment Information</h2>
             <form id="paymentForm" novalidate>
                <div class="form-group">
                    <label for="cardholderName">Cardholder Name</label>
                    <input type="text" id="cardholderName"  required>
                </div>
                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                     <input type="text" id="cardNumber"  maxlength="19" required>
                 </div>
                <div class="form-group">
                    <label for="expiryDate">Expiry Date (MM/YY)</label>
                     <input type="text" id="expiryDate"  maxlength="5" required>
                </div>
                <div class="form-group">
                     <label for="cvv">CVV</label>
                    <input type="text" id="cvv" maxlength="4" required>
                </div>
               <button type="button" id="proceedButton">Proceed</button>
                 <div class="success-message" id="successMessage"></div>
                 <div class="error-message" id="errorMessage"></div>
             </form>
          </div>
    </div>
  <script>
     document.getElementById('proceedButton').addEventListener('click', function() {
             // Get the input values and clean up whitespace
            const cardholderName = document.getElementById('cardholderName').value.trim();
            const cardNumber = document.getElementById('cardNumber').value.trim();
            const expiryDate = document.getElementById('expiryDate').value.trim();
            const cvv = document.getElementById('cvv').value.trim();

            // Grab the message display areas
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

             // Reset messages when button is clicked
            successMessage.textContent = '';
            errorMessage.textContent = '';

             // Check for empty fields (basic validation)
            if (!cardholderName || !cardNumber || !expiryDate || !cvv) {
                errorMessage.textContent = 'Please fill in all the required fields.';
                return; // Stop further checks if any field is empty
            }

             // Card number format check: 16 digits, can be grouped in 4s by spaces
            if (!/^(\d{4} ?){3}\d{4}$/.test(cardNumber)) {
                errorMessage.textContent = 'Invalid card number format.';
                return; // Stop if invalid
            }
            // Expiry Date format check: MM/YY
            if (!/^\d{2}\/\d{2}$/.test(expiryDate)) {
                errorMessage.textContent = 'Invalid expiry date format. Use MM/YY.';
                return; // Stop if invalid
            }
             // CVV format check: 3 or 4 digits
             if (!/^\d{3,4}$/.test(cvv)) {
                errorMessage.textContent = 'Invalid CVV format.';
                return; // Stop if invalid
            }

            // If all checks pass, show the success message
            successMessage.textContent = 'Payment successful!';
        });
  </script>
</body>
</html>
