<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Online Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #4CAF50; /* Green background */
            color: #333;
        }

        .header {
            position: relative;
            display: flex;
            align-items: center;
        }

        .logo {
            position: absolute;
            top: 10px;
            left: 20px;
            width: 100px;
        }

        .header .home-button {
            position: absolute;
            top: calc(10vh + 10%);
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20vh; /* Move down 20% of the viewport height */
        }

        .form-section h2 {
            color: black;
            border-left: 3px solid black;
            padding-left: 10px;
        }

        .container {
            max-width: calc(900px * 1.3); /* Make container 1.3 times wider */
            padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: flex;           
            justify-content: center;
            align-items: flex-start; 
            gap: 20px;              
        }

        .form-section{
            flex: 1 1 0px;       
            min-width: calc(45% * 1.3); /* Sections remain 1.3 times their original size */
            padding: 20px;
            box-sizing: border-box;
        }

         .info-section {
            flex: 1 1 0px;       
            min-width: calc(45% * 1.3); /* Sections remain 1.3 times their original size */
            padding: 20px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 16px;
        }

        .form-group textarea {
            resize: none;
        }

        .form-group button {
            background-color: #4CAF50; /* Green */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
        }

        .form-group button:hover {
            background-color: #45a049;
        }

        .info-section ul {
            list-style: none;
            padding: 0;
        }

        .info-section ul li {
            margin-bottom: 10px;
        }

        .info-section ul li span {
            font-weight: bold;
        }
    </style>
    <script>
        function showMessage() {
            alert('Your message has been sent successfully!');
        }
    </script>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="logo-placeholder.png" alt="Logo">
        </div>
        <a href="#" class="home-button">Home</a>
    </div>

    <div class="main-content">
        <div class="container">
            <div class="form-section">
                <h2>Contact Us</h2>
                <form action="#" method="post" onsubmit="showMessage(); return false;">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter Email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Your Phone</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter Phone" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>
                    </div>
                    <div class="form-group">
                        <button type="submit">Send Message</button>
                    </div>
                </form>
            </div>

            <div class="info-section">
                <h2>Our Address</h2>
                <ul>
                    <li><span>Address:</span> 123 Main Street, Springfield, USA</li>
                    <li><span>Phone:</span> +1 (555) 123-4567</li>
                    <li><span>Email:</span> support@onlinestore.com</li>
                    <li><span>Working Hours:</span> 9:00 AM - 6:00 PM (Mon - Fri)</li>
                    <li><a href="#">View on Google Maps</a></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
